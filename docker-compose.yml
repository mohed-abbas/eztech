# Development stack — postgres + backend + frontend, one `docker compose up` with hot reload.
# This is for local dev only. Production Docker (multi-stage, nginx, CI/CD) is a later phase.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eztech_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eztech_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # Run tsx directly (not `npm run dev`) so we skip --env-file=.env — env comes from compose below.
    command: ["npx", "tsx", "watch", "src/index.ts"]
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eztech_dev
      JWT_SECRET: abcdefghijklmnopqrstuvwxyz123456
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000
      ADMIN_EMAIL: admin@eztech.fr
      ADMIN_PASSWORD: change-me
      SEED_CATALOG: "true"
      SEED_DEMO: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
      # seed-catalog.ts reads ../../frontend/app/data/mock relative to /app/prisma -> /frontend/app/data/mock
      - ./frontend/app/data/mock:/frontend/app/data/mock:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      NODE_ENV: development
      # browser-facing (public runtimeConfig) -> backend via host port mapping
      VITE_API_URL: http://localhost:3001/api
      VITE_USE_MOCK: "false"
      # BFF / SSR (server-only runtimeConfig) -> backend over the compose network
      NUXT_API_URL: http://backend:3001/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
  frontend_nuxt:
