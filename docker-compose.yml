# Stack complète — application (postgres + backend + frontend) et observabilité
# (GlitchTip + Umami), démarrées ensemble par un seul `docker compose up`.
#
# Ports hôte : frontend 3000 · API 3001 · Umami 3002 · Postgres 5432 · Adminer 8080 · GlitchTip 8000
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in eztech/.env}
      POSTGRES_DB: ${POSTGRES_DB:-eztech_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # --import loads instrument.ts before app code so Sentry's auto-instrumentation patches Express/Prisma
    # (a top-level import alone is too late under ESM — Node logs "express is not instrumented").
    command: ["npx", "tsx", "watch", "--import", "./src/instrument.ts", "src/index.ts"]
    # Stripe keys + DELIVERY_FEE load from the gitignored backend/.env; the environment block below
    # overrides infra vars (DATABASE_URL, JWT, etc.) from the global eztech/.env.
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in eztech/.env}@postgres:5432/${POSTGRES_DB:-eztech_dev}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (min 32 chars) in eztech/.env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@eztech.fr}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      SEED_CATALOG: ${SEED_CATALOG:-true}
      SEED_DEMO: ${SEED_DEMO:-true}
      SEED_ZONES: ${SEED_ZONES:-true}
      # optional error tracking — empty by default (inert). Set in eztech/.env for the telemetry demo.
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
      # seed-catalog.ts reads ../../frontend/app/data/mock relative to /app/prisma -> /frontend/app/data/mock
      - ./frontend/app/data/mock:/frontend/app/data/mock:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    # VITE_STRIPE_PUBLISHABLE_KEY (+ NUXT_DELIVERY_FEE) load from the gitignored frontend/.env;
    # the environment block below overrides API URLs and the mock flag.
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      # browser-facing (public runtimeConfig) -> backend via host port mapping
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
      VITE_USE_MOCK: ${VITE_USE_MOCK:-false}
      # BFF / SSR (server-only runtimeConfig) -> backend over the compose network
      NUXT_API_URL: http://backend:3001/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: "3000"
      # optional telemetry — all empty by default (inert). Set in eztech/.env for the demo.
      # browser DSN uses GlitchTip's host port; the Nuxt server DSN uses the internal compose host.
      NUXT_PUBLIC_SENTRY_DSN: ${NUXT_PUBLIC_SENTRY_DSN:-}
      NUXT_SENTRY_DSN: ${NUXT_SENTRY_DSN:-}
      NUXT_PUBLIC_UMAMI_HOST: ${NUXT_PUBLIC_UMAMI_HOST:-}
      NUXT_PUBLIC_UMAMI_WEBSITE_ID: ${NUXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      # panne de paiement simulée (démo GlitchTip) — 0 pour la désactiver
      NUXT_PUBLIC_PAYMENT_FAIL_RATE: ${NUXT_PUBLIC_PAYMENT_FAIL_RATE:-0.33}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    depends_on:
      - backend

  # ---- GlitchTip : centralisation des erreurs (compatible SDK Sentry) -----------------------------
  glitchtip:
    image: glitchtip/glitchtip:6
    environment:
      SERVER_ROLE: all_in_one # web + worker + migrations dans un seul conteneur
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD:?set GLITCHTIP_DB_PASSWORD in eztech/.env}@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-valkey:6379/0
      VALKEY_URL: redis://glitchtip-valkey:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?set GLITCHTIP_SECRET_KEY in eztech/.env}
      PORT: "8080"
      GLITCHTIP_DOMAIN: http://localhost:${GLITCHTIP_PORT:-8000}
      EMAIL_URL: consolemail:// # dev : les emails sont écrits dans les logs du conteneur
      DEFAULT_FROM_EMAIL: telemetry@eztech.local
      ENABLE_OPEN_USER_REGISTRATION: "True" # permet de créer le premier compte à la volée
    ports:
      - "${GLITCHTIP_PORT:-8000}:8080"
    volumes:
      - glitchtip_uploads:/code/uploads
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-valkey:
        condition: service_started
    restart: unless-stopped

  # Base dédiée à GlitchTip — aucun port hôte, isolée de celle de l'application.
  glitchtip-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?set GLITCHTIP_DB_PASSWORD in eztech/.env}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # File de tâches de fond de GlitchTip (Valkey = fork de Redis, même protocole).
  glitchtip-valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped

  # ---- Umami : analytique web sans cookies --------------------------------------------------------
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:?set UMAMI_DB_PASSWORD in eztech/.env}@umami-postgres:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET in eztech/.env}
    ports:
      - "${UMAMI_PORT:-3002}:3000"
    depends_on:
      umami-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    init: true
    restart: unless-stopped

  # Base dédiée à Umami — aucun port hôte, isolée de celle de l'application.
  umami-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:?set UMAMI_DB_PASSWORD in eztech/.env}
    volumes:
      - umami_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
  frontend_nuxt:
  glitchtip_postgres_data:
  glitchtip_uploads:
  umami_postgres_data:
