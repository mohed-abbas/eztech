name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend — lint, typecheck, tests
    runs-on: ubuntu-latest

    # Base Postgres dédiée aux tests : les tests appliquent les migrations puis seedent cette base.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eztech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eztech_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10


    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eztech_test
      JWT_SECRET: dummy-ci-value-not-a-secret-0000000000
      LOG_LEVEL: silent
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend — tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
